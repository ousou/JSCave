<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JavaCave — browser edition</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="game-page" aria-label="JavaCave">
      <h1>JavaCave</h1>
      <canvas id="game" width="128" height="160" tabindex="0" role="img" aria-label="JavaCave game">JavaCave needs a browser with Canvas support.</canvas>
      <p id="controls">Hold pointer or Space to fly. Release to fall.</p>
      <noscript>JavaScript is required to play JavaCave.</noscript>
    </main>
    <script src="src/scaling.js"></script>
    <script src="src/main.js"></script>
  </body>
</html>
