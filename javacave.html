:root {

  font-family: Georgia, "Times New Roman", serif;

body {
  align-items: center;
  background: #202030;
  color: #fff;
  display: flex;
  justify-content: safe center;
  margin: 0;
  min-height: 100vh;

  margin: 0 0 .75rem;
