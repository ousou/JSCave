<!doctype html>
<meta charset="utf-8">
<canvas id="game" width="128" height="160" aria-label="JavaCave game"></canvas>
<script>
  const scale = new URLSearchParams(location.search).get('scale');
  window.JavaCaveTestOptions = { scaleMode: scale === null ? 'auto' : Number(scale), testApi: true };
</script>
<script src="../src/scaling.js"></script>
<script src="../src/engine.js"></script>
<script src="../src/renderer.js"></script>
<script src="../src/controller.js"></script>
<script src="../src/main.js"></script>
<script>
  if (new URLSearchParams(location.search).get('start') === '1') {
    const { controller, engine } = window.JavaCave;
    controller.stop();
    engine.pointerDown();
    controller.advance();
    controller.advance();
    document.getElementById('game').dataset.gameStarted = String(engine.state === 1 && engine.gameCount === 1);
  }
</script>
