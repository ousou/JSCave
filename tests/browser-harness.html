<!doctype html>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<canvas id="game" width="128" height="160" tabindex="0" aria-label="JSCave game. Enter to start or restart; hold Space or pointer to fly."></canvas>
<script>
  const scale = new URLSearchParams(location.search).get('scale');
  window.JSCaveTestOptions = { scaleMode: scale === null ? 'auto' : Number(scale), testApi: true };
</script>
<script src="../src/scaling.js"></script>
<script src="../src/engine.js"></script>
<script src="../src/renderer.js"></script>
<script src="../src/controller.js"></script>
<script src="../src/main.js"></script>
<script>
  if (new URLSearchParams(location.search).get('start') === '1') {
    const { controller, engine } = window.JSCave;
    controller.stop();
    engine.pointerDown();
    controller.advance();
    controller.advance();
    document.getElementById('game').dataset.gameStarted = String(engine.state === 1 && engine.gameCount === 1);
  }
</script>
